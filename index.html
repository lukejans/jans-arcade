<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/favicon.svg" type="svg" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap"
      rel="stylesheet" />
    <!-- CSS -->
    <link rel="stylesheet" href="./styles/index.css" />
    <!-- JavaScript -->
    <script defer src="./src/terminal/commands.js"></script>
    <script defer src="./src/terminal/command-line.js"></script>
    <title>Jans Arcade</title>
  </head>
  <body>
    <main>
      <section class="terminal-output">
        <a id="before"></a>
      </section>

      <section class="command">
        <p class="prompt">
          <span>guest</span><span class="alt">@</span
          ><span class="cmds">jansarcade</span
          ><span class="alt"> <span class="tick">></span> </span>
        </p>
        <p class="command-line"></p>
        <div class="caret blink"></div>

        <textarea
          type="text"
          id="type"
          aria-hidden="true"
          maxlength="15"
          oninput="cliDisplayInput()"
          autofocus></textarea>
      </section>
    </main>
  </body>
</html>
