<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/favicon.svg" type="svg" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap"
      rel="stylesheet" />
    <!-- CSS -->
    <link rel="stylesheet" href="./styles/index.css" />
    <!-- JavaScript -->
    <script defer src="./js/commands.js"></script>
    <script defer src="./js/command-line.js"></script>
    <title>Jans Arcade</title>
  </head>
  <body>
    <main>
      <section class="terminal">
        <a id="before"></a>
      </section>

      <section class="command">
        <p class="prompt">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <path
              d="M464 256A208 208 0 1 1 48 256a208 208 0 1 1 416 0zM0 256a256 256 0 1 0 512 0A256 256 0 1 0 0 256zM232 120V256c0 8 4 15.5 10.7 20l96 64c11 7.4 25.9 4.4 33.3-6.7s4.4-25.9-6.7-33.3L280 243.2V120c0-13.3-10.7-24-24-24s-24 10.7-24 24z" />
          </svg>
          <span class="clock">00:00:00</span>
          <br />
          <span>guest</span><span class="alt">@</span
          ><span class="cmds">jansarcade</span
          ><span class="alt">: ~ <span class="tick">></span> </span>
        </p>
        <p class="command-line"></p>
        <div class="caret blink"></div>
        <textarea
          type="text"
          id="type"
          aria-hidden="true"
          maxlength="15"
          oninput="cliDisplayInput()"
          autofocus></textarea>
      </section>
    </main>
  </body>
</html>
